name: Deploy Corbetti site

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: corbetti-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack deployment artifact
        run: tar -czf /tmp/corbetti-site-deploy.tgz dist deploy package.json package-lock.json

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/corbetti_deploy
          chmod 600 ~/.ssh/corbetti_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
        working-directory: .

      - name: Upload artifact
        run: |
          scp -i ~/.ssh/corbetti_deploy /tmp/corbetti-site-deploy.tgz \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/corbetti-site-deploy-${{ github.sha }}.tgz"
        working-directory: .

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/corbetti_deploy "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
          set -euo pipefail

          APP_DIR=/var/www/corbetti/site
          ARTIFACT=/tmp/corbetti-site-deploy-${{ github.sha }}.tgz

          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          rm -rf dist deploy
          tar -xzf "$ARTIFACT"
          npm ci --omit=dev

          if pm2 describe corbetti-site >/dev/null 2>&1; then
            pm2 restart corbetti-site --update-env
          else
            pm2 start deploy/ecosystem.config.cjs
          fi

          pm2 save
          rm -f "$ARTIFACT"
          EOF
        working-directory: .
